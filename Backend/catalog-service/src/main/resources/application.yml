server:
  port: 8082

spring:
  application:
    name: catalog-service
  data:
    mongodb:
      uri: mongodb://${MONGO_USER:pricing_user}:${MONGO_PASSWORD:pricing_secret_pwd}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:catalog_db}?authSource=admin
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

catalog:
  cache:
    prefix: "product:"
    ttl-minutes: 5
  images:
    upload-dir: ${APP_IMAGES_UPLOAD_DIR:./uploads/products}
    base-url: ${APP_IMAGES_BASE_URL:http://localhost:8082/products/images}
    max-file-size-bytes: 5242880
    allowed-types: image/jpeg,image/png,image/webp,image/gif
  order-service:
    host: ${ORDER_SERVICE_HOST:localhost}
    port: ${ORDER_SERVICE_PORT:8087}
  web-client:
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.ecommerce.catalogservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"